{%- comment -%}
Inline critical CSS. Identical to the <style> block previously in index.html.
Kept inline (not external) to render the hero/nav without blocking on style.css.
{%- endcomment -%}
<style>
  :root{--black:#000000;--white:#ffffff;--grey:#888888;--grey-dark:#1a1a1a;--grey-mid:#333333;--accent:#c026d3;--accent-dim:#8b1f95;--font-display:'Bebas Neue','Arial Black',sans-serif;--font-body:'Barlow',sans-serif;--nav-h:56px;--max-w:1100px;--section-pad:100px}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{background:var(--black);color:var(--white);font-family:var(--font-body);font-size:16px;line-height:1.6;overflow-x:hidden}
  img{display:block;max-width:100%;height:auto}
  a{color:inherit;text-decoration:none}
  ol,ul{list-style:none}
  .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
  .skip-link{position:absolute;top:-100%;left:0;z-index:9999;padding:10px 20px;background:var(--accent);color:var(--white);font-size:14px;font-weight:600;letter-spacing:.05em;text-decoration:none}
  .skip-link:focus{top:0}
  :focus-visible{outline:2px solid var(--accent);outline-offset:3px}
  #nav{position:fixed;top:0;left:0;right:0;z-index:100;height:var(--nav-h);display:flex;align-items:center;justify-content:space-between;padding:0 24px;background:rgba(0,0,0,0.9);backdrop-filter:blur(8px);border-bottom:1px solid transparent;transition:border-color .3s}
  #nav.scrolled{border-color:var(--grey-mid)}
  .nav-logo{font-family:var(--font-display);font-size:1.4rem;letter-spacing:.1em;color:var(--accent)}
  #nav ul{display:flex;align-items:center;gap:32px}
  #nav ul a{font-size:13px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--grey);transition:color .15s}
  #nav ul a:hover{color:var(--white)}
  .nav-cta{color:var(--accent)!important;border:1px solid var(--accent);padding:6px 16px}
  .nav-cta:hover{background:var(--accent);color:var(--white)!important}
  #hero{position:relative;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
  .hero-bg{position:absolute;inset:0;background-image:image-set(url('assets/spotify_banner.webp') type('image/webp'),url('assets/spotify_banner.jpg') type('image/jpeg'));background-size:cover;background-position:center;filter:brightness(0.45);transform:scale(1.04)}
  .hero-bg::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.1) 0%,rgba(0,0,0,0) 50%,rgba(0,0,0,.9) 100%)}
  .hero-content{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:28px;padding:80px 24px 60px;text-align:center}
  .hero-logo{width:min(560px,80vw);filter:invert(1) drop-shadow(0 4px 24px rgba(192,38,211,.5));animation:logo-in .8s cubic-bezier(.22,1,.36,1) both}
  @keyframes logo-in{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
  .hero-tagline{font-family:var(--font-display);font-size:clamp(1.2rem,3vw,1.8rem);letter-spacing:.25em;text-transform:uppercase;color:var(--grey);animation:fade-in .8s .3s cubic-bezier(.22,1,.36,1) both}
  .hero-links{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;animation:fade-in .8s .5s cubic-bezier(.22,1,.36,1) both}
  @keyframes fade-in{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .hero-scroll-hint{position:absolute;bottom:32px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:8px;z-index:2;animation:fade-in 1s 1.2s both}
  .hero-scroll-hint span{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--grey)}
  .scroll-line{width:1px;height:40px;background:linear-gradient(to bottom,var(--grey),transparent);animation:scroll-pulse 2s infinite}
  @keyframes scroll-pulse{0%,100%{opacity:.3}50%{opacity:1}}
  .btn{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;font-family:var(--font-body);font-weight:600;font-size:14px;letter-spacing:.08em;text-transform:uppercase;border:2px solid transparent;cursor:pointer;transition:background .15s,color .15s,border-color .15s}
  .btn-primary{background:var(--accent);color:var(--white);border-color:var(--accent)}
  .btn-primary:hover{background:var(--accent-dim);border-color:var(--accent-dim)}
  .btn-outline{background:transparent;color:var(--white);border-color:var(--grey-mid)}
  .btn-outline:hover{border-color:var(--accent);color:var(--accent)}
  .btn-icon{width:16px;height:16px;flex-shrink:0}
  @media(max-width:768px){#nav ul{gap:16px}#nav ul li:not(:last-child){display:none}}
  @media(max-width:480px){#nav ul{gap:12px}}
  @media(prefers-reduced-motion:reduce){.hero-logo,.hero-tagline,.hero-links,.hero-scroll-hint{animation:none;opacity:1;transform:none}.scroll-line{animation:none;opacity:.6}}
</style>
