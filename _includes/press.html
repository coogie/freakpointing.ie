<!-- PRESS -->
<section id="press">
  <div class="section-inner press-inner">
    <h2 class="section-label">Press</h2>
    <blockquote class="press-quote">
      <p class="quote-mark">"</p>
      <p class="quote-text">
        Halfway through the first track I was already hooked. Fresh, loud,
        crisp in its delivery &mdash; these guys have delivered not only a
        listenable release, but a highly enjoyable one.
      </p>
      <footer class="quote-attribution">
        <span class="quote-author">Dorn Simon</span>
        <span class="quote-source">Into d'Groove</span>
        <span class="quote-score">9/10</span>
      </footer>
    </blockquote>
    <button class="btn btn-outline press-pdf-link" onclick="openReviewLightbox()">
      Read full review
    </button>
  </div>
</section>
