<!-- LIGHTBOX -->
<div id="lightbox" class="lightbox" aria-hidden="true" role="dialog" aria-modal="true">
  <button class="lightbox-close" aria-label="Close">&times;</button>
  <button class="lightbox-prev" aria-label="Previous">&#8592;</button>
  <button class="lightbox-next" aria-label="Next">&#8594;</button>
  <div class="lightbox-img-wrap">
    <img id="lightbox-img" src="" alt="" width="1024" height="683">
  </div>
  <div class="lightbox-counter" id="lightbox-counter"></div>
</div>
