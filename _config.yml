_banner: &banner /assets/spotify_banner.jpg
_brand: &brand Freak Pointing
_socials: &socials
  - https://open.spotify.com/artist/3LfefkYeYlGoRGDMnarX1d
  - https://freakpointing.bandcamp.com/
  - https://music.apple.com/ie/artist/freak-pointing/1798274194
  - https://www.instagram.com/freakpointingband/

title: *brand
tagline: Dublin Rock
description: Freak Pointing are a four-piece Dublin rock band. Hard riffs, melodic anthems, punk energy.
url: https://freakpointing.ie
locale: en_IE
lang: en-IE

accent: "#c026d3"

# Brand mark — feeds JSON-LD `publisher.logo` (Organization). Top-level so it
# becomes `site.logo` in Liquid; nesting under a `site:` key would make it
# `site.site.logo` and the plugin wouldn't see it. The `&banner` anchor lets
# the same path be reused below in `defaults` without duplication.
logo: *banner

# Brand info — feeds {% seo %}'s JSON-LD WebSite block (name, sameAs).
social:
  name: *brand
  links: *socials

plugins:
  - jekyll-sitemap
  - jekyll-seo-tag

# Suppress static-file PDFs etc. from the generated sitemap.
defaults:
  - scope:
      path: "assets"
    values:
      sitemap: false
  - scope:
      path: ""    # matches every page
      type: pages
    values:
      image:
        path: *banner
        width: 2660
        height: 1140
        alt: *brand

exclude:
  - CLAUDE.md
  - docs/
  - .remember/
  - .superpowers/
  - .claude/
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor/
  - .bundle/

permalink: pretty
