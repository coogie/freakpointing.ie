# Press reviews. Each entry emits one standalone Review JSON-LD node via
# _includes/jsonld/reviews.html, with `itemReviewed` pointing at the reviewed
# release's MusicAlbum @id (single-direction cross-ref — the album does NOT
# carry a `review:` back-pointer; the schema.org validator flags both
# directions present as a directional conflict).
#
# `body` matches the visible quote in _includes/press.html (HTML entities
# resolved to Unicode; JSON-LD strings can't contain HTML).
- id: into-d-groove
  reviewer:
    name: Dorn Simon
  publisher:
    name: Into d'Groove
  rating: 9
  best_rating: 10
  date_published: "2026-04-17"
  reviewed_release: too-tall-to-see-the-moon
  body: |
    Halfway through the first track I was already hooked. Fresh, loud,
    crisp in its delivery — these guys have delivered not only a
    listenable release, but a highly enjoyable one.
  same_as:
    - https://www.instagram.com/freakpointingband/p/DXOXZHqjRd0/