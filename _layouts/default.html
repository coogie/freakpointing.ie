<!DOCTYPE html>
<html lang="en-IE">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}{% if page.title_suffix %} — {{ page.title_suffix }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="canonical" href="{% if page.canonical_url %}{{ page.canonical_url }}{% else %}{{ site.url }}{% endif %}">
  <meta name="robots" content="index, follow, max-image-preview:large">
  <meta property="og:title" content="{{ page.og_title | default: site.title }}">
  <meta property="og:description" content="{{ page.og_description | default: site.description }}">
  <meta property="og:image" content="{{ site.url }}{{ site.data.site_meta.band.banner_image.url }}">
  <meta property="og:image:width" content="{{ site.data.site_meta.band.banner_image.width }}">
  <meta property="og:image:height" content="{{ site.data.site_meta.band.banner_image.height }}">
  <meta property="og:url" content="{% if page.og_url %}{{ page.og_url }}{% else %}{{ site.url }}{% endif %}">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="{{ site.locale }}">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ page.title | default: site.title }}{% if page.title_suffix %} — {{ page.title_suffix }}{% endif %}">
  <meta name="twitter:description" content="{{ page.og_description | default: site.description }}">
  <meta name="twitter:image" content="{{ site.url }}{{ site.data.site_meta.band.banner_image.url }}">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/favicon-32.png' | relative_url }}">
  <link rel="icon" type="image/png" sizes="192x192" href="{{ '/assets/favicon-192.png' | relative_url }}">
  <link rel="apple-touch-icon" sizes="180x180" href="{{ '/assets/apple-touch-icon.png' | relative_url }}">
  <meta name="theme-color" content="#000000">
  {% include head-critical.html %}
  <link rel="preload" href="{{ '/style.css' | relative_url }}" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="{{ '/style.css' | relative_url }}"></noscript>
  <script src="{{ '/script.js' | relative_url }}" defer></script>
  <link rel="preload" as="image" href="{{ '/assets/spotify_banner.webp' | relative_url }}" type="image/webp" fetchpriority="high">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,400;0,600;1,400&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,400;0,600;1,400&display=swap"></noscript>
  {% include jsonld-graph.html %}
</head>
<body>

  <a href="#music" class="skip-link">Skip to main content</a>

  {% include nav.html %}

  {{ content }}

  {% include lightbox.html %}

  {% include review-lightbox.html %}

  {% include video-lightbox.html %}

</body>
</html>
